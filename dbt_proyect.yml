# dbt_project.yml
# Proyecto de capa de compatibilidad cross-db Postgres  Redshift
# para el contexto de migracin Teradata  Redshift de Banco Galicia.

name: 'galicia_dbt_compat'
version: '1.0.0'
config-version: 2

# Profile que define las conexiones (en ~/.dbt/profiles.yml)
profile: 'galicia_dbt_compat'

# Rutas estndar
model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# ============================================================
# on-run-start: instala la capa de compatibilidad SQL en Postgres
# ============================================================
# Crea funciones (getdate, dateadd, nvl, etc.) en la base Postgres
# para que cdigo "Redshift-style" funcione sin reescribir.
# Es idempotente (CREATE OR REPLACE) y solo corre si target.type='postgres'.
on-run-start:
  - "{{ install_postgres_compat() }}"

# ============================================================
# Variables del proyecto
# ============================================================
vars:
  # Factor multiplicador para varchar_safe()  cubre UTF-8 multibyte.
  # 4 es conservador; bajar a 2 si todos los strings son ASCII.
  varchar_multibyte_factor: 4

  # Zona horaria default para convert_timezone().
  default_timezone: 'America/Argentina/Buenos_Aires'

# ============================================================
# Configuracin de modelos
# ============================================================
# Convencin: TODOS los modelos del proyecto van bajo schemas
# explcitos por capa. Ac usamos solo "examples" como ejemplo
# pedaggico; en un proyecto productivo: bronze, silver, gold.
models:
  galicia_dbt_compat:
    examples:
      +materialized: table
      +tags: ['compat_examples']
      # +schema: examples  # opcional: separa los ejemplos del resto

# ============================================================
# Configuracin de seeds
# ============================================================
seeds:
  galicia_dbt_compat:
    +quote_columns: false
    +tags: ['compat_seeds']
