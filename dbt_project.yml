# Snippet para dbt_project.yml
# Agregar/mergear estas secciones en tu dbt_project.yml existente.

# ----------------------------------------------------------
# Hook de inicio: instala la capa de compatibilidad en Postgres
# ----------------------------------------------------------
on-run-start:
  - "{{ install_postgres_compat() }}"


# ----------------------------------------------------------
# (opcional) Variables que las macros podrían leer en el futuro
# ----------------------------------------------------------
vars:
  varchar_multibyte_factor: 4   # x4 para cubrir UTF-8 multibyte
  default_timezone: 'America/Argentina/Buenos_Aires'


# ----------------------------------------------------------
# Configuración de modelos: ejemplo de DDL Redshift via config()
# ----------------------------------------------------------
# Esto NO va en dbt_project.yml directamente sino en cada modelo,
# pero dejo el patrón documentado:
#
#   -- models/marts/customers.sql
#   {{ config(
#       materialized='table',
#       dist='customer_id',                     -- DISTKEY
#       sort=['created_at', 'customer_id'],     -- SORTKEY compound
#       sort_type='compound',
#       on_schema_change='sync_all_columns'
#   ) }}
#
# El adapter Postgres ignora dist/sort silenciosamente.


