# packages.yml
# ============================================================
# Dependencias dbt opcionales pero recomendadas.
# Después de modificar este archivo: dbt deps
# ============================================================

packages:

  # dbt-utils: macros estándar de la comunidad (generate_surrogate_key,
  # pivot, unpivot, accepted_range, etc.) y los cross-db macros oficiales
  # (dbt.dateadd, dbt.datediff, dbt.last_day, dbt.listagg, etc.).
  - package: dbt-labs/dbt_utils
    version: [">=1.1.0", "<2.0.0"]

  # dbt-expectations: tests más sofisticados (rangos, regex, formatos).
  # Útil para validar paridad de resultados Postgres ↔ Redshift.
  # Descomentar para usar:
  # - package: calogica/dbt_expectations
  #   version: [">=0.10.0", "<0.11.0"]
